<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="#ff8c00" name="theme-color"/>
<link href="manifest.webmanifest" rel="manifest"/>
<title>Crear Usuario</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					colors: {
						"primary": "#ff8c00",
						"background-light": "#f8f7f5",
						"background-dark": "#1A1A1A",
					},
					fontFamily: {
						"display": ["Inter"]
					},
					borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
				},
			},
		}
	</script>
<style>
	body { min-height: max(884px, 100dvh); }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center hover:bg-primary/10 rounded-full transition-colors" id="back_button" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight ml-2">Crear cuenta</h2>
</header>
<main class="flex flex-1 items-center justify-center px-4 py-8">
<section class="w-full max-w-md rounded-2xl bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-white/10 shadow-lg p-6 sm:p-8">
<div class="mb-8">
<p class="text-primary text-xs font-bold uppercase tracking-[0.28em]">Kepedimos</p>
<h1 class="mt-3 text-3xl font-bold tracking-tight">Registra tu usuario</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Crea una cuenta para continuar con tus pedidos.</p>
</div>
<form class="space-y-5" id="register_form">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold" for="full_name">Nombre completo</label>
<input class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 px-4" id="full_name" required="" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold" for="email">Correo</label>
<input class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 px-4" id="email" required="" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold" for="password">Contraseña</label>
<input class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 px-4" id="password" minlength="8" required="" type="password"/>
</div>
<div class="rounded-xl bg-primary/10 text-primary px-4 py-3 text-sm" id="register_message">La cuenta se registrará contra la API en PostgreSQL.</div>
<button class="w-full py-3 px-6 rounded-xl bg-primary text-white font-bold hover:bg-primary/90 transition-all shadow-lg shadow-primary/20" type="submit">Crear cuenta</button>
</form>
<div class="mt-6 flex items-center justify-between gap-4 text-sm">
<a class="text-slate-500 dark:text-slate-400 hover:text-primary" href="index.html">Ir al inicio</a>
<a class="text-primary font-semibold" href="login.html">Ya tengo cuenta</a>
</div>
</section>
</main>
<script>
	document.getElementById('back_button').addEventListener('click', () => {
		window.location.href = 'login.html';
	});

	document.getElementById('register_form').addEventListener('submit', async (event) => {
		event.preventDefault();
		const message = document.getElementById('register_message');

		const payload = {
			full_name: document.getElementById('full_name').value,
			email: document.getElementById('email').value,
			password: document.getElementById('password').value,
		};

		try {
			const response = await fetch('http://localhost:8016/api/v1/auth/register', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(payload)
			});
			const result = await response.json();
			if (!response.ok) {
				throw new Error(result.detail || 'No se pudo crear la cuenta');
			}

			localStorage.setItem('kepedimos.session', JSON.stringify(result));
			message.textContent = 'Cuenta creada correctamente';
			message.className = 'rounded-xl bg-emerald-100 text-emerald-700 px-4 py-3 text-sm';
			window.setTimeout(() => {
				window.location.href = 'index.html';
			}, 500);
		} catch (error) {
			message.textContent = error.message || 'No se pudo crear la cuenta';
			message.className = 'rounded-xl bg-red-100 text-red-700 px-4 py-3 text-sm';
		}
	});
</script>
<script src="pwa.js"></script>
</body></html>
