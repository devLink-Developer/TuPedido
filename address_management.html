<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="#ff8c00" name="theme-color"/>
<link href="manifest.webmanifest" rel="manifest"/>
<title>Manage Shipping Addresses</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff8c00",
                        "background-light": "#f8f7f5",
                        "background-dark": "#1A1A1A",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full max-w-md mx-auto flex-col overflow-x-hidden border-x border-primary/10">
<!-- Header Navigation -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-primary/20 px-4 py-4">
<div class="max-w-md mx-auto flex items-center justify-between">
<button class="p-2 hover:bg-slate-200 dark:hover:bg-primary/10 rounded-full transition-colors" id="btn-back" type="button">
<span class="material-symbols-outlined align-middle">arrow_back</span>
</button>
<h1 class="text-lg font-bold">Shipping Addresses</h1>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-primary/10 rounded-full transition-colors" id="btn-notifications">
<span class="material-symbols-outlined align-middle">notifications</span>
</button>
</div>
</header>
<main class="flex-1 w-full px-4 py-6 space-y-6 pb-28">
<!-- Map Preview / Add New Section -->
<div class="relative w-full h-48 rounded-xl overflow-hidden bg-slate-200 dark:bg-primary/5 border border-slate-200 dark:border-primary/20 group cursor-pointer" id="container-map-preview">
<img class="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-700" data-alt="Modern stylized map interface with location pin" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTvBYiNLCSkePOhps0QBkzbtLfWdW8m2jtj5ZYw4opuiiNYg34_Gp3Ue4RHDeY67mzwxCfsBT9fJrCVXmQSJ1faafQJm2YCmoeL3gwZVQGKNS-BmSpbece-PdWrynwg9J5OqHnGPYDuQV2pq37wrPsFnXyMz0wduJsTCaunnWHpwSX-NFcrJSNd_YPugcQCjWpL42aRuFn8SUcgxd6MQsV9HFLEeYMpu9S9Hz6XR01sIHrhmVRFDqnNfZwgYkG_jujYXH2GN10YQ"/>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/80 to-transparent flex flex-col justify-end p-4">
<button class="bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 transition-all active:scale-95" id="btn-add-address-map" type="button">
<span class="material-symbols-outlined">add_location_alt</span>
<span>Add New Address</span>
</button>
</div>
</div>
<section class="hidden bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/10 rounded-xl p-4 space-y-4" id="address-form-section">
<div class="flex items-center justify-between gap-3">
<h2 class="text-base font-bold" id="address-form-title">Nueva dirección</h2>
<button class="text-sm text-slate-500 hover:text-primary transition-colors" id="btn-cancel-form" type="button">Cancelar</button>
</div>
<form class="space-y-3" id="address-form">
<input id="address-id" type="hidden"/>
<label class="block">
<span class="text-sm font-medium text-slate-600 dark:text-slate-300">Etiqueta</span>
<input class="mt-1 w-full rounded-xl border border-slate-300 dark:border-primary/20 bg-background-light dark:bg-background-dark px-4 py-3 text-sm" id="address-label" maxlength="80" placeholder="Casa, Oficina, Familiar" required type="text"/>
</label>
<label class="block">
<span class="text-sm font-medium text-slate-600 dark:text-slate-300">Calle principal</span>
<input class="mt-1 w-full rounded-xl border border-slate-300 dark:border-primary/20 bg-background-light dark:bg-background-dark px-4 py-3 text-sm" id="address-street" maxlength="160" placeholder="Av. Principal 123" required type="text"/>
</label>
<label class="block">
<span class="text-sm font-medium text-slate-600 dark:text-slate-300">Detalles</span>
<input class="mt-1 w-full rounded-xl border border-slate-300 dark:border-primary/20 bg-background-light dark:bg-background-dark px-4 py-3 text-sm" id="address-details-input" maxlength="160" placeholder="Torre A, piso 4, puerta 12" type="text"/>
</label>
<label class="flex items-center gap-3 rounded-xl bg-background-light dark:bg-background-dark px-4 py-3 border border-slate-200 dark:border-primary/10">
<input class="rounded border-slate-300 text-primary focus:ring-primary" id="address-default" type="checkbox"/>
<span class="text-sm font-medium">Usar como dirección por defecto</span>
</label>
<button class="w-full rounded-xl bg-primary text-white font-bold py-3 hover:bg-primary/90 transition-colors disabled:opacity-60" id="btn-save-address" type="submit">Guardar dirección</button>
</form>
</section>
<div class="hidden rounded-xl px-4 py-3 text-sm font-medium" id="address-feedback"></div>
<!-- Address List -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-primary/70">Saved Locations</h2>
<span class="text-xs bg-slate-200 dark:bg-primary/20 px-2 py-1 rounded-full text-slate-600 dark:text-primary">3 Addresses</span>
</div>
<div id="address-list"></div>
</section>
<!-- Manual Entry Option -->
<button class="w-full border-2 border-dashed border-slate-300 dark:border-primary/20 rounded-xl py-6 flex flex-col items-center justify-center gap-2 text-slate-500 dark:text-slate-400 hover:border-primary/50 hover:text-primary transition-all group" id="btn-manual-entry" type="button">
<span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform">edit_location</span>
<span class="font-medium">Enter Address Manually</span>
</button>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-primary/20 pb-6 pt-2 px-6 flex justify-between items-center z-20">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="index.html" id="nav-home">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="orders.html" id="nav-orders">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Orders</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="address_management.html" id="nav-addresses">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">location_on</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Addresses</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="login.html" id="nav-profile">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Profile</span>
</a>
</nav>
<!-- Floating Action Button for smaller screens -->
<div class="fixed bottom-24 left-0 right-0 z-30 sm:hidden">
<div class="mx-auto flex w-full max-w-md justify-end px-6">
<button class="bg-primary text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-transform active:scale-95" id="fab-add" type="button">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
</div>
<script>
    const session = JSON.parse(localStorage.getItem('kepedimos.session') || 'null');
    const addressFormSection = document.getElementById('address-form-section');
    const addressForm = document.getElementById('address-form');
    const addressFeedback = document.getElementById('address-feedback');
    const addressList = document.getElementById('address-list');
    const addressCounter = document.querySelector('span.text-xs.bg-slate-200');
    document.getElementById('btn-back').addEventListener('click', () => {
        window.location.href = 'cart.html';
    });

    function authHeaders() {
        return {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session.access_token}`
        };
    }

    function showFeedback(message, tone = 'info') {
        addressFeedback.className = 'rounded-xl px-4 py-3 text-sm font-medium';
        if (tone === 'error') {
            addressFeedback.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-500/10', 'dark:text-red-300');
        } else if (tone === 'success') {
            addressFeedback.classList.add('bg-emerald-100', 'text-emerald-700', 'dark:bg-emerald-500/10', 'dark:text-emerald-300');
        } else {
            addressFeedback.classList.add('bg-slate-200', 'text-slate-700', 'dark:bg-primary/10', 'dark:text-primary');
        }
        addressFeedback.textContent = message;
        addressFeedback.classList.remove('hidden');
    }

    function hideFeedback() {
        addressFeedback.classList.add('hidden');
    }

    function openAddressForm(address = null) {
        addressFormSection.classList.remove('hidden');
        document.getElementById('address-form-title').textContent = address ? 'Editar dirección' : 'Nueva dirección';
        document.getElementById('address-id').value = address?.id || '';
        document.getElementById('address-label').value = address?.label || '';
        document.getElementById('address-street').value = address?.street || '';
        document.getElementById('address-details-input').value = address?.details || '';
        document.getElementById('address-default').checked = Boolean(address?.is_default);
        hideFeedback();
        document.getElementById('address-label').focus();
    }

    function closeAddressForm() {
        addressForm.reset();
        document.getElementById('address-id').value = '';
        addressFormSection.classList.add('hidden');
    }

    function serializeAddress(address) {
        return encodeURIComponent(JSON.stringify(address));
    }

    async function loadAddresses() {
        if (!session) {
            window.location.href = 'login.html';
            return;
        }

        addressList.innerHTML = '<div class="rounded-xl bg-white dark:bg-primary/5 p-4 text-sm text-slate-500">Cargando direcciones...</div>';
        const response = await fetch('http://localhost:8016/api/v1/addresses', {
            headers: authHeaders()
        });
        if (!response.ok) {
            addressList.innerHTML = '<div class="rounded-xl bg-red-100 dark:bg-red-500/10 p-4 text-sm text-red-700 dark:text-red-300">No se pudieron cargar las direcciones.</div>';
            showFeedback('No se pudieron cargar las direcciones guardadas.', 'error');
            return;
        }
        const addresses = await response.json();
        addressCounter.textContent = `${addresses.length} Addresses`;
        if (!addresses.length) {
            addressList.innerHTML = '<div class="rounded-xl bg-white dark:bg-primary/5 p-4 text-sm text-slate-500">Todavía no tienes direcciones guardadas. Usa el formulario para crear la primera.</div>';
            return;
        }
        addressList.innerHTML = addresses.map((address) => `
            <div class="bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/10 rounded-xl p-4 flex items-start gap-4 hover:border-primary/40 transition-colors mb-4">
                <div class="bg-primary/10 text-primary p-3 rounded-lg">
                    <span class="material-symbols-outlined">${address.label.toLowerCase().includes('work') ? 'work' : 'home'}</span>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between gap-2">
                        <h3 class="font-bold text-base truncate">${address.label}</h3>
                        ${address.is_default ? '<span class="bg-primary text-white text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-tighter">Default</span>' : ''}
                    </div>
                    <p class="text-sm text-slate-600 dark:text-slate-400 mt-1 line-clamp-2">${address.street}${address.details ? `, ${address.details}` : ''}</p>
                    <div class="mt-4 flex gap-3">
                        <button class="text-xs font-semibold flex items-center gap-1 text-slate-500 hover:text-primary transition-colors" data-address="${serializeAddress(address)}" type="button" onclick="editAddress(this.dataset.address)"><span class="material-symbols-outlined text-sm">edit</span> Edit</button>
                        <button class="text-xs font-semibold flex items-center gap-1 text-slate-500 hover:text-red-500 transition-colors" type="button" onclick="deleteAddress(${address.id})"><span class="material-symbols-outlined text-sm">delete</span> Delete</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function saveAddress(event) {
        event.preventDefault();
        hideFeedback();
        const id = document.getElementById('address-id').value;
        const payload = {
            label: document.getElementById('address-label').value.trim(),
            street: document.getElementById('address-street').value.trim(),
            details: document.getElementById('address-details-input').value.trim(),
            is_default: document.getElementById('address-default').checked
        };
        if (!payload.label || !payload.street) {
            showFeedback('Etiqueta y calle principal son obligatorias.', 'error');
            return;
        }

        const saveButton = document.getElementById('btn-save-address');
        saveButton.disabled = true;
        saveButton.textContent = id ? 'Actualizando...' : 'Guardando...';
        try {
            const response = await fetch(id ? `http://localhost:8016/api/v1/addresses/${id}` : 'http://localhost:8016/api/v1/addresses', {
                method: id ? 'PUT' : 'POST',
                headers: authHeaders(),
                body: JSON.stringify(payload)
            });
            const result = response.status === 204 ? null : await response.json().catch(() => null);
            if (!response.ok) {
                throw new Error(result?.detail || 'No se pudo guardar la dirección');
            }
            showFeedback(id ? 'Dirección actualizada correctamente.' : 'Dirección creada correctamente.', 'success');
            closeAddressForm();
            await loadAddresses();
        } catch (error) {
            showFeedback(error.message || 'No se pudo guardar la dirección.', 'error');
        } finally {
            saveButton.disabled = false;
            saveButton.textContent = 'Guardar dirección';
        }
    }

    function editAddress(serializedAddress) {
        openAddressForm(JSON.parse(decodeURIComponent(serializedAddress)));
    }

    async function deleteAddress(id) {
        if (!confirm('¿Eliminar esta dirección guardada?')) {
            return;
        }

        try {
            const response = await fetch(`http://localhost:8016/api/v1/addresses/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${session.access_token}` }
            });
            if (!response.ok && response.status !== 204) {
                throw new Error('No se pudo eliminar la dirección');
            }
            showFeedback('Dirección eliminada correctamente.', 'success');
            await loadAddresses();
        } catch (error) {
            showFeedback(error.message || 'No se pudo eliminar la dirección.', 'error');
        }
    }

    window.editAddress = editAddress;
    window.deleteAddress = deleteAddress;

    document.getElementById('btn-add-address-map').addEventListener('click', () => openAddressForm());
    document.getElementById('btn-manual-entry').addEventListener('click', () => openAddressForm());
    document.getElementById('fab-add').addEventListener('click', () => openAddressForm());
    document.getElementById('btn-cancel-form').addEventListener('click', closeAddressForm);
    addressForm.addEventListener('submit', saveAddress);
    document.addEventListener('DOMContentLoaded', loadAddresses);
</script>
</div>
<script src="pwa.js"></script>
</body></html>
