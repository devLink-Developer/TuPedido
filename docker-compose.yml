name: tupedido

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8015:8015"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    command: ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port 8016 --reload"]
    env_file:
      - .env
    environment:
      DELIVERY_EMBEDDED_WORKER: "false"
    ports:
      - "8016:8016"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 90s

volumes:
  postgres_data:
