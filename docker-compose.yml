name: tupedido

services:
  frontend:
    build:
      context: ./frontend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.kepedimos.rule=Host(`kepedimos.com`)"
      - "traefik.http.routers.kepedimos.entrypoints=websecure"
      - "traefik.http.routers.kepedimos.tls=true"
      - "traefik.http.routers.kepedimos.middlewares=default-sec-headers@file,gzip-compress@file,kepedimos-cors"
      - "traefik.http.routers.kepedimos.service=kepedimos"
      - "traefik.http.services.kepedimos.loadbalancer.server.port=8015"
      - "traefik.http.middlewares.kepedimos-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.kepedimos-cors.headers.accesscontrolallowheaders=Content-Type,Authorization,X-Requested-With,Accept,Origin,Idempotency-Key,X-API-TOKEN,x-locale"
      - "traefik.http.middlewares.kepedimos-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.kepedimos-cors.headers.accesscontrolalloworiginlist=https://kepedimos.com,capacitor://localhost,ionic://localhost,http://localhost,http://localhost:8015,http://localhost:5173"
      - "traefik.http.middlewares.kepedimos-cors.headers.accesscontrolmaxage=86400"
      - "traefik.http.middlewares.kepedimos-cors.headers.addvaryheader=true"
    ports:
      - "8015:8015"
    networks:
      - default
      - traefik_proxy
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DELIVERY_EMBEDDED_WORKER: "false"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      WEB_TIMEOUT: ${WEB_TIMEOUT:-60}
      WEB_GRACEFUL_TIMEOUT: ${WEB_GRACEFUL_TIMEOUT:-30}
      WEB_KEEP_ALIVE: ${WEB_KEEP_ALIVE:-5}
    ports:
      - "8016:8016"
    volumes:
      - media_data:/app/media
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8016/health').status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    command: ["python", "-m", "app.worker"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    command:
      [
        "postgres",
        "-c",
        "max_connections=${POSTGRES_MAX_CONNECTIONS:-200}",
        "-c",
        "shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}",
        "-c",
        "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-768MB}",
        "-c",
        "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}",
        "-c",
        "work_mem=${POSTGRES_WORK_MEM:-8MB}",
        "-c",
        "checkpoint_completion_target=0.9",
        "-c",
        "max_wal_size=${POSTGRES_MAX_WAL_SIZE:-2GB}",
        "-c",
        "min_wal_size=${POSTGRES_MIN_WAL_SIZE:-256MB}",
        "-c",
        "wal_buffers=16MB",
        "-c",
        "default_statistics_target=100",
        "-c",
        "idle_in_transaction_session_timeout=${POSTGRES_IDLE_IN_TRANSACTION_SESSION_TIMEOUT:-30000}",
        "-c",
        "statement_timeout=${POSTGRES_STATEMENT_TIMEOUT:-30000}",
        "-c",
        "lock_timeout=${POSTGRES_LOCK_TIMEOUT:-5000}",
      ]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    shm_size: ${POSTGRES_SHM_SIZE:-256mb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 90s

volumes:
  postgres_data:
  media_data:

networks:
  default:
  traefik_proxy:
    external: true
