name: tupedido

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8015:8015"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DELIVERY_EMBEDDED_WORKER: "false"
    ports:
      - "8016:8016"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8016/health').status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    command: ["python", "-m", "app.worker"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 90s

volumes:
  postgres_data:
