<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="#ff8c00" name="theme-color"/>
<link href="manifest.webmanifest" rel="manifest"/>
<title>Detalle del Pedido</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#ff8c00",
                        "background-light": "#f8f7f5",
                        "background-dark": "#1A1A1A",
                    },
                    fontFamily: {
                        display: ["Inter"]
                    },
                    borderRadius: { DEFAULT: "0.5rem", lg: "1rem", xl: "1.5rem", full: "9999px" },
                },
            },
        };
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full max-w-md mx-auto flex-col overflow-x-hidden border-x border-primary/10">
<header class="sticky top-0 z-10 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-primary/10 px-4 py-4 flex items-center justify-between">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors" onclick="window.location.href='orders.html'" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold">Seguimiento</h1>
<a class="flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors" href="cart.html">
<span class="material-symbols-outlined">shopping_cart</span>
</a>
</header>

<main class="flex-1 px-4 py-6 space-y-4 pb-24">
<div class="hidden rounded-xl px-4 py-3 text-sm font-medium" id="order-detail-feedback"></div>

<section class="rounded-2xl bg-white dark:bg-primary/5 border border-primary/10 p-5 space-y-3">
<div class="flex items-start justify-between gap-4">
<div>
<p class="text-xs uppercase tracking-[0.2em] text-slate-500 dark:text-primary/70" id="order-identifier">Pedido</p>
<h2 class="text-2xl font-bold mt-1" id="order-address">Dirección</h2>
<p class="text-sm text-slate-500 dark:text-slate-400" id="order-created">Fecha</p>
</div>
<span class="rounded-full bg-primary/10 text-primary px-3 py-1 text-xs font-bold uppercase tracking-wide" id="order-status">created</span>
</div>
<div class="grid grid-cols-2 gap-3 text-sm">
<div class="rounded-xl bg-background-light dark:bg-background-dark px-4 py-3">
<p class="text-slate-500 dark:text-slate-400">Pago</p>
<p class="font-bold" id="order-payment">Tarjeta</p>
</div>
<div class="rounded-xl bg-background-light dark:bg-background-dark px-4 py-3">
<p class="text-slate-500 dark:text-slate-400">Total</p>
<p class="font-bold text-primary" id="order-total">$0.00</p>
</div>
</div>
</section>

<section class="rounded-2xl bg-white dark:bg-primary/5 border border-primary/10 p-5">
<div class="flex items-center justify-between mb-4">
<h3 class="text-lg font-bold">Tracking</h3>
<span class="text-xs uppercase tracking-[0.2em] text-slate-500 dark:text-primary/70">Estado actual</span>
</div>
<div class="space-y-3" id="tracking-steps"></div>
</section>

<section class="rounded-2xl bg-white dark:bg-primary/5 border border-primary/10 p-5">
<h3 class="text-lg font-bold mb-4">Productos</h3>
<div class="space-y-3" id="order-items"></div>
</section>

<section class="rounded-2xl bg-white dark:bg-primary/5 border border-primary/10 p-5">
<h3 class="text-lg font-bold mb-4">Resumen</h3>
<div class="space-y-2 text-sm">
<div class="flex justify-between"><span class="text-slate-500 dark:text-slate-400">Subtotal</span><span id="detail-subtotal">$0.00</span></div>
<div class="flex justify-between"><span class="text-slate-500 dark:text-slate-400">Envío</span><span id="detail-delivery">$0.00</span></div>
<div class="flex justify-between"><span class="text-slate-500 dark:text-slate-400">Servicio</span><span id="detail-service">$0.00</span></div>
<div class="flex justify-between text-base font-bold pt-3 border-t border-primary/10"><span>Total</span><span class="text-primary" id="detail-total">$0.00</span></div>
        </div>
    </section>
</main>
</div>

<script>
    const session = JSON.parse(localStorage.getItem('kepedimos.session') || 'null');
    const feedback = document.getElementById('order-detail-feedback');
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('order_id');

    function prettyStatus(status) {
        return {
            created: 'Pedido recibido',
            preparing: 'En preparación',
            on_the_way: 'En camino',
            delivered: 'Entregado',
            issue_reported: 'Con incidencia',
            cancelled: 'Cancelado'
        }[status] || status;
    }

    function statusBadgeClass(status) {
        return {
            created: 'bg-sky-100 text-sky-700 dark:bg-sky-500/10 dark:text-sky-300',
            preparing: 'bg-amber-100 text-amber-700 dark:bg-amber-500/10 dark:text-amber-300',
            on_the_way: 'bg-violet-100 text-violet-700 dark:bg-violet-500/10 dark:text-violet-300',
            delivered: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-300',
            issue_reported: 'bg-rose-100 text-rose-700 dark:bg-rose-500/10 dark:text-rose-300',
            cancelled: 'bg-slate-200 text-slate-700 dark:bg-slate-600/40 dark:text-slate-200'
        }[status] || 'bg-primary/10 text-primary';
    }

    function showFeedback(message, tone = 'info') {
        feedback.className = 'rounded-xl px-4 py-3 text-sm font-medium';
        if (tone === 'error') {
            feedback.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-500/10', 'dark:text-red-300');
        } else if (tone === 'success') {
            feedback.classList.add('bg-emerald-100', 'text-emerald-700', 'dark:bg-emerald-500/10', 'dark:text-emerald-300');
        } else {
            feedback.classList.add('bg-slate-200', 'text-slate-700', 'dark:bg-primary/10', 'dark:text-primary');
        }
        feedback.textContent = message;
        feedback.classList.remove('hidden');
    }

    function buildTracking(order) {
        if (order.status === 'cancelled') {
            document.getElementById('tracking-steps').innerHTML = `
                <div class="flex gap-3 items-start rounded-xl bg-slate-100 dark:bg-slate-700/30 border border-slate-200 dark:border-slate-600 px-4 py-3">
                    <div class="mt-0.5 flex size-8 items-center justify-center rounded-full bg-slate-300 dark:bg-slate-600 text-slate-700 dark:text-slate-100">
                        <span class="material-symbols-outlined text-base">close</span>
                    </div>
                    <div>
                        <p class="font-semibold">Pedido cancelado</p>
                        <p class="text-sm text-slate-500 dark:text-slate-400">El pedido fue cancelado desde operación y ya no avanzará en el tracking.</p>
                    </div>
                </div>
            `;
            return;
        }

        if (order.status === 'issue_reported') {
            document.getElementById('tracking-steps').innerHTML = `
                <div class="flex gap-3 items-start rounded-xl bg-rose-50 dark:bg-rose-500/10 border border-rose-200 dark:border-rose-500/20 px-4 py-3">
                    <div class="mt-0.5 flex size-8 items-center justify-center rounded-full bg-rose-500 text-white">
                        <span class="material-symbols-outlined text-base">error</span>
                    </div>
                    <div>
                        <p class="font-semibold text-rose-700 dark:text-rose-300">Incidencia reportada</p>
                        <p class="text-sm text-rose-600 dark:text-rose-200">Tu pedido necesita revisión operativa. El equipo actualizará el estado cuando se resuelva.</p>
                    </div>
                </div>
            `;
            return;
        }

        const statusOrder = ['created', 'preparing', 'on_the_way', 'delivered'];
        const currentIndex = Math.max(statusOrder.indexOf(order.status), 0);
        const labels = [
            { id: 'created', title: 'Pedido recibido', description: 'La orden fue registrada y persistida en PostgreSQL.' },
            { id: 'preparing', title: 'En preparación', description: 'El restaurante está preparando tus productos.' },
            { id: 'on_the_way', title: 'En camino', description: 'El repartidor salió hacia tu dirección.' },
            { id: 'delivered', title: 'Entregado', description: 'La entrega fue completada correctamente.' }
        ];

        document.getElementById('tracking-steps').innerHTML = labels.map((step, index) => {
            const completed = index <= currentIndex;
            return `
                <div class="flex gap-3 items-start rounded-xl ${completed ? 'bg-primary/10 border-primary/20' : 'bg-background-light dark:bg-background-dark border-primary/10'} border px-4 py-3">
                    <div class="mt-0.5 flex size-8 items-center justify-center rounded-full ${completed ? 'bg-primary text-white' : 'bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-300'}">
                        <span class="material-symbols-outlined text-base">${completed ? 'check' : 'radio_button_unchecked'}</span>
                    </div>
                    <div>
                        <p class="font-semibold">${step.title}</p>
                        <p class="text-sm text-slate-500 dark:text-slate-400">${step.description}</p>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderOrder(order) {
        document.getElementById('order-identifier').textContent = `Pedido #${order.order_id}`;
        document.getElementById('order-address').textContent = order.address_label;
        document.getElementById('order-created').textContent = new Date(order.created_at).toLocaleString('es-ES');
        document.getElementById('order-status').textContent = prettyStatus(order.status);
        document.getElementById('order-status').className = `rounded-full px-3 py-1 text-xs font-bold uppercase tracking-wide ${statusBadgeClass(order.status)}`;
        document.getElementById('order-payment').textContent = order.payment_method === 'cash' ? 'Efectivo' : 'Tarjeta';
        document.getElementById('order-total').textContent = `$${Number(order.total).toFixed(2)}`;
        document.getElementById('detail-subtotal').textContent = `$${Number(order.subtotal).toFixed(2)}`;
        document.getElementById('detail-delivery').textContent = `$${Number(order.delivery_fee).toFixed(2)}`;
        document.getElementById('detail-service').textContent = `$${Number(order.service_fee).toFixed(2)}`;
        document.getElementById('detail-total').textContent = `$${Number(order.total).toFixed(2)}`;
        document.getElementById('order-items').innerHTML = order.items.map((item) => `
            <div class="flex items-center justify-between gap-3 rounded-xl bg-background-light dark:bg-background-dark px-4 py-3">
                <div>
                    <p class="font-semibold">${item.product_name}</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Cantidad: ${item.quantity}</p>
                </div>
                <span class="font-bold text-primary">$${(Number(item.unit_price) * Number(item.quantity)).toFixed(2)}</span>
            </div>
        `).join('');
        buildTracking(order);
        showFeedback('Detalle y seguimiento cargados desde PostgreSQL.', 'success');
    }

    async function loadOrderDetail() {
        if (!session) {
            localStorage.setItem('kepedimos.flash', JSON.stringify({ message: 'Inicia sesión para ver el detalle de un pedido.', tone: 'info' }));
            window.location.href = 'login.html';
            return;
        }
        if (!orderId) {
            showFeedback('No se indicó un pedido válido.', 'error');
            return;
        }

        const response = await fetch(`http://localhost:8016/api/v1/orders/${orderId}`, {
            headers: { 'Authorization': `Bearer ${session.access_token}` }
        });
        if (!response.ok) {
            showFeedback('No se pudo cargar el detalle del pedido.', 'error');
            return;
        }

        const order = await response.json();
        renderOrder(order);
    }

    document.addEventListener('DOMContentLoaded', loadOrderDetail);
</script>
<script src="pwa.js"></script>
</body></html>
