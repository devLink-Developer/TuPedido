<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="#ff8c00" name="theme-color"/>
<link href="manifest.webmanifest" rel="manifest"/>
<title>Mis Pedidos</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#ff8c00",
                        "background-light": "#f8f7f5",
                        "background-dark": "#1A1A1A",
                    },
                    fontFamily: {
                        display: ["Inter"]
                    },
                    borderRadius: { DEFAULT: "0.5rem", lg: "1rem", xl: "1.5rem", full: "9999px" },
                },
            },
        };
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full max-w-md mx-auto flex-col overflow-x-hidden border-x border-primary/10">
<header class="sticky top-0 z-10 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-primary/10 px-4 py-4 flex items-center justify-between">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors" onclick="window.location.href='index.html'" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold">Mis Pedidos</h1>
<a class="flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors" href="cart.html">
<span class="material-symbols-outlined">shopping_cart</span>
</a>
</header>

<main class="flex-1 px-4 py-6 space-y-4 pb-28">
<div class="hidden rounded-xl px-4 py-3 text-sm font-medium" id="orders-feedback"></div>

<section class="rounded-2xl bg-white dark:bg-primary/5 border border-primary/10 p-5">
<div class="flex items-center justify-between gap-4">
<div>
<p class="text-sm uppercase tracking-[0.2em] text-slate-500 dark:text-primary/70">Historial</p>
<h2 class="text-2xl font-bold mt-1">Pedidos persistidos</h2>
</div>
<div class="rounded-xl bg-primary/10 text-primary px-3 py-2 text-right">
<p class="text-[10px] uppercase tracking-[0.2em]">Total</p>
<p class="text-lg font-bold" id="orders-count">0</p>
</div>
</div>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-3">Cada pedido mostrado aquí proviene de PostgreSQL y queda disponible después de recargar la aplicación.</p>
</section>

<section class="space-y-4" id="orders-list">
<div class="rounded-xl bg-white dark:bg-primary/5 p-4 text-sm text-slate-500">Cargando pedidos...</div>
</section>
</main>

<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-background-light dark:bg-background-dark border-t border-primary/10 pb-6 pt-2 px-6 flex justify-between items-center z-20">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="index.html">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="orders.html">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">receipt_long</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Orders</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="cart.html">
<span class="material-symbols-outlined">shopping_cart</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Cart</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="address_management.html">
<span class="material-symbols-outlined">location_on</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Address</span>
</a>
</nav>
</div>

<script>
    const session = JSON.parse(localStorage.getItem('kepedimos.session') || 'null');
    const ordersFeedback = document.getElementById('orders-feedback');
    const ordersList = document.getElementById('orders-list');
    const ordersCount = document.getElementById('orders-count');

    function prettyStatus(status) {
        return {
            created: 'Pedido recibido',
            preparing: 'En preparación',
            on_the_way: 'En camino',
            delivered: 'Entregado',
            issue_reported: 'Con incidencia',
            cancelled: 'Cancelado'
        }[status] || status;
    }

    function statusBadgeClass(status) {
        return {
            created: 'bg-sky-100 text-sky-700 dark:bg-sky-500/10 dark:text-sky-300',
            preparing: 'bg-amber-100 text-amber-700 dark:bg-amber-500/10 dark:text-amber-300',
            on_the_way: 'bg-violet-100 text-violet-700 dark:bg-violet-500/10 dark:text-violet-300',
            delivered: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-300',
            issue_reported: 'bg-rose-100 text-rose-700 dark:bg-rose-500/10 dark:text-rose-300',
            cancelled: 'bg-slate-200 text-slate-700 dark:bg-slate-600/40 dark:text-slate-200'
        }[status] || 'bg-primary/10 text-primary';
    }

    function showOrdersFeedback(message, tone = 'info') {
        ordersFeedback.className = 'rounded-xl px-4 py-3 text-sm font-medium';
        if (tone === 'error') {
            ordersFeedback.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-500/10', 'dark:text-red-300');
        } else if (tone === 'success') {
            ordersFeedback.classList.add('bg-emerald-100', 'text-emerald-700', 'dark:bg-emerald-500/10', 'dark:text-emerald-300');
        } else {
            ordersFeedback.classList.add('bg-slate-200', 'text-slate-700', 'dark:bg-primary/10', 'dark:text-primary');
        }
        ordersFeedback.textContent = message;
        ordersFeedback.classList.remove('hidden');
    }

    function consumeFlash() {
        const rawFlash = localStorage.getItem('kepedimos.flash');
        if (!rawFlash) {
            return;
        }

        localStorage.removeItem('kepedimos.flash');
        try {
            const flash = JSON.parse(rawFlash);
            showOrdersFeedback(flash.message, flash.tone || 'info');
        } catch {
            showOrdersFeedback(rawFlash, 'info');
        }
    }

    function renderOrders(orders) {
        ordersCount.textContent = String(orders.length);
        if (!orders.length) {
            ordersList.innerHTML = '<div class="rounded-xl bg-white dark:bg-primary/5 p-4 text-sm text-slate-500">Todavía no tienes pedidos confirmados. Cuando completes un checkout, aparecerá aquí.</div>';
            return;
        }

        ordersList.innerHTML = orders.map((order) => `
            <article class="rounded-2xl bg-white dark:bg-primary/5 border border-primary/10 p-4 space-y-4">
                <div class="flex items-start justify-between gap-4">
                    <div>
                        <p class="text-xs uppercase tracking-[0.2em] text-slate-500 dark:text-primary/70">Pedido #${order.order_id}</p>
                        <h3 class="text-lg font-bold mt-1">${order.address_label}</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400">Pago: ${order.payment_method === 'cash' ? 'Efectivo' : 'Tarjeta'}</p>
                        <p class="text-xs text-slate-400 dark:text-primary/60 mt-1">${new Date(order.created_at).toLocaleString('es-ES')}</p>
                    </div>
                    <span class="rounded-full px-3 py-1 text-xs font-bold uppercase tracking-wide ${statusBadgeClass(order.status)}">${prettyStatus(order.status)}</span>
                </div>
                <div class="space-y-3">
                    ${order.items.map((item) => `
                        <div class="flex items-center justify-between gap-3 rounded-xl bg-background-light dark:bg-background-dark px-4 py-3">
                            <div>
                                <p class="font-semibold">${item.product_name}</p>
                                <p class="text-xs text-slate-500 dark:text-slate-400">Cantidad: ${item.quantity}</p>
                            </div>
                            <span class="font-bold text-primary">$${(Number(item.unit_price) * Number(item.quantity)).toFixed(2)}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="grid grid-cols-2 gap-3 text-sm">
                    <div class="rounded-xl bg-background-light dark:bg-background-dark px-4 py-3">
                        <p class="text-slate-500 dark:text-slate-400">Subtotal</p>
                        <p class="font-bold">$${Number(order.subtotal).toFixed(2)}</p>
                    </div>
                    <div class="rounded-xl bg-background-light dark:bg-background-dark px-4 py-3">
                        <p class="text-slate-500 dark:text-slate-400">Total</p>
                        <p class="font-bold text-primary">$${Number(order.total).toFixed(2)}</p>
                    </div>
                </div>
                <a class="block text-center rounded-xl border border-primary/20 text-primary font-semibold py-3 hover:bg-primary/10 transition-colors" href="order_detail.html?order_id=${order.order_id}">Ver detalle y seguimiento</a>
            </article>
        `).join('');
    }

    async function loadOrders() {
        if (!session) {
            localStorage.setItem('kepedimos.flash', JSON.stringify({ message: 'Inicia sesión para ver tu historial de pedidos.', tone: 'info' }));
            window.location.href = 'login.html';
            return;
        }

        consumeFlash();
        const response = await fetch('http://localhost:8016/api/v1/orders', {
            headers: { 'Authorization': `Bearer ${session.access_token}` }
        });
        if (!response.ok) {
            ordersList.innerHTML = '<div class="rounded-xl bg-red-100 dark:bg-red-500/10 p-4 text-sm text-red-700 dark:text-red-300">No se pudo cargar el historial.</div>';
            showOrdersFeedback('No se pudo recuperar el historial de pedidos.', 'error');
            return;
        }

        const orders = await response.json();
        renderOrders(orders);
    }

    document.addEventListener('DOMContentLoaded', loadOrders);
</script>
<script src="pwa.js"></script>
</body></html>
