<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="#ff8c00" name="theme-color"/>
<link href="manifest.webmanifest" rel="manifest"/>
<title>Gestión de Restaurantes</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					colors: {
						"primary": "#ff8c00",
						"background-light": "#f8f7f5",
						"background-dark": "#1A1A1A",
					},
					fontFamily: {
						"display": ["Inter"]
					},
					borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
				},
			},
		}
	</script>
<style>
	body { min-height: max(884px, 100dvh); }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<header class="flex items-center justify-between bg-background-light dark:bg-background-dark p-4 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10">
<div class="flex items-center gap-2">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center hover:bg-primary/10 rounded-full transition-colors" id="back_button" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Restaurant Management</h2>
</div>
<button class="rounded-xl bg-primary text-white px-4 py-2 text-sm font-bold" id="logout_button" type="button">Salir</button>
</header>
<main class="max-w-4xl mx-auto w-full p-4 md:p-8 space-y-6">
<div class="hidden rounded-xl px-4 py-3 text-sm font-medium" id="restaurant-management-feedback"></div>
<section class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
<div>
<p class="text-primary text-xs font-bold uppercase tracking-[0.28em]">Panel Admin</p>
<h1 class="mt-2 text-3xl font-bold tracking-tight">Restaurantes activos</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Administra los restaurantes cargados en PostgreSQL.</p>
</div>
<div class="flex gap-3">
<a class="rounded-xl border border-slate-300 dark:border-slate-700 px-4 py-3 text-sm font-semibold" href="index.html">Ver sitio</a>
<a class="rounded-xl border border-primary/20 text-primary px-4 py-3 text-sm font-semibold" href="admin_orders.html">Gestionar pedidos</a>
<a class="rounded-xl bg-primary text-white px-4 py-3 text-sm font-bold shadow-lg shadow-primary/20" href="products_management.html">Agregar restaurante</a>
</div>
</section>
<section class="grid gap-4" id="restaurant_cards">
<div class="rounded-xl bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 p-5">Cargando restaurantes...</div>
</section>
</main>
<script>
	const session = JSON.parse(localStorage.getItem('tupedido.session') || 'null');
	if (!session || session.user?.role !== 'admin') {
		localStorage.setItem('tupedido.flash', JSON.stringify({ message: 'Inicia sesión como administrador para acceder al panel.', tone: 'info' }));
		window.location.href = 'login.html';
	}

	const feedback = document.getElementById('restaurant-management-feedback');

	function showFeedback(message, tone = 'info') {
		feedback.className = 'rounded-xl px-4 py-3 text-sm font-medium';
		if (tone === 'error') {
			feedback.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-500/10', 'dark:text-red-300');
		} else if (tone === 'success') {
			feedback.classList.add('bg-emerald-100', 'text-emerald-700', 'dark:bg-emerald-500/10', 'dark:text-emerald-300');
		} else {
			feedback.classList.add('bg-primary/10', 'text-primary');
		}
		feedback.textContent = message;
		feedback.classList.remove('hidden');
	}

	function consumeFlash() {
		const rawFlash = localStorage.getItem('tupedido.flash');
		if (!rawFlash) {
			return;
		}
		localStorage.removeItem('tupedido.flash');
		try {
			const flash = JSON.parse(rawFlash);
			showFeedback(flash.message, flash.tone || 'info');
		} catch {
			showFeedback(rawFlash, 'info');
		}
	}

	document.getElementById('back_button').addEventListener('click', () => {
		window.location.href = 'index.html';
	});

	document.getElementById('logout_button').addEventListener('click', () => {
		localStorage.removeItem('tupedido.session');
		localStorage.setItem('tupedido.flash', JSON.stringify({ message: 'Sesión cerrada correctamente.', tone: 'success' }));
		window.location.href = 'login.html';
	});

	async function loadRestaurants() {
		const container = document.getElementById('restaurant_cards');

		try {
			const response = await fetch('http://localhost:8016/api/v1/restaurants');
			const restaurants = await response.json();
			if (!response.ok) {
				throw new Error('No se pudieron cargar los restaurantes');
			}

			container.innerHTML = restaurants.map((restaurant) => `
				<article class="rounded-2xl overflow-hidden bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 shadow-sm">
					<div class="h-44 bg-cover bg-center" style="background-image: url('${restaurant.cover_image}')"></div>
					<div class="p-5 space-y-3">
						<div class="flex items-start justify-between gap-4">
							<div>
								<h3 class="text-xl font-bold">${restaurant.name}</h3>
								<p class="text-sm text-slate-500 dark:text-slate-400">${restaurant.cuisine}</p>
							</div>
							<span class="rounded-lg bg-primary/10 px-3 py-1 text-sm font-bold text-primary">${restaurant.rating}</span>
						</div>
						<p class="text-sm text-slate-600 dark:text-slate-400">${restaurant.description}</p>
						<div class="flex items-center justify-between text-sm text-slate-500 dark:text-slate-400">
							<span>${restaurant.eta_minutes}</span>
							<span>${restaurant.delivery_fee}</span>
						</div>
					</div>
				</article>
			`).join('');
		} catch (error) {
			container.innerHTML = `<div class="rounded-xl bg-red-100 text-red-700 p-4 text-sm">${error.message || 'No se pudieron cargar los restaurantes'}</div>`;
		}
	}

	consumeFlash();
	loadRestaurants();
</script>
<script src="pwa.js"></script>
</body></html>
