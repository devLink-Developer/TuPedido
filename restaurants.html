<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="#ff8c00" name="theme-color"/>
<link href="manifest.webmanifest" rel="manifest"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff8c00",
                        "background-light": "#f8f7f5",
                        "background-dark": "#1A1A1A",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .fill-icon { font-variation-settings: 'FILL' 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Header & Top Navigation -->
<header class="sticky top-0 z-50 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-b border-slate-200 dark:border-white/10">
<div class="flex items-center p-4 justify-between max-w-md mx-auto w-full border-x border-primary/10">
<div class="flex flex-col" id="current-location-selector">
<span class="text-xs text-primary font-bold uppercase tracking-wider">Entregar en</span>
<div class="flex items-center gap-1 cursor-pointer">
<span class="material-symbols-outlined text-primary text-lg">location_on</span>
<h2 class="text-lg font-bold leading-tight tracking-tight" id="current-address">Selecciona tu dirección</h2>
<span class="material-symbols-outlined text-slate-400">expand_more</span>
</div>
</div>
<div class="flex gap-2">
<button class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-white/10 text-slate-900 dark:text-white" id="search-toggle-button" type="button">
<span class="material-symbols-outlined">search</span>
</button>
<button class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-white/10 text-slate-900 dark:text-white" id="notifications-button" type="button">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</div>
<div class="hidden border-t border-slate-200 dark:border-white/10 px-4 py-3 max-w-md mx-auto w-full border-x border-primary/10" id="restaurant-search-panel">
<label class="relative block">
<span class="material-symbols-outlined pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<input class="w-full rounded-xl border border-slate-200 bg-white py-3 pl-12 pr-4 text-sm text-slate-900 outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20 dark:border-white/10 dark:bg-white/5 dark:text-slate-100" id="restaurant-search-input" placeholder="Buscar restaurante o categoría" type="text"/>
</label>
</div>
<!-- Quick Filters -->
<div class="flex gap-3 px-4 pb-4 overflow-x-auto no-scrollbar max-w-md mx-auto w-full border-x border-primary/10">
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary px-4 text-background-dark font-semibold text-sm">
<span class="material-symbols-outlined text-lg">bolt</span>
<span>Entrega rápida</span>
</button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-slate-100 dark:bg-white/10 px-4 text-slate-700 dark:text-slate-300 font-medium text-sm">
<span class="material-symbols-outlined text-lg">star</span>
<span>Mejor puntuados</span>
</button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-slate-100 dark:bg-white/10 px-4 text-slate-700 dark:text-slate-300 font-medium text-sm">
<span class="material-symbols-outlined text-lg">payments</span>
<span>Menor costo</span>
</button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-slate-100 dark:bg-white/10 px-4 text-slate-700 dark:text-slate-300 font-medium text-sm">
<span class="material-symbols-outlined text-lg">tune</span>
<span>Filtros</span>
</button>
</div>
</header>
<!-- Restaurants List Section -->
<main class="flex-1 max-w-md mx-auto w-full p-4 space-y-6 pb-24 border-x border-primary/10">
<section class="hidden rounded-2xl border border-slate-200 bg-white p-4 dark:border-white/10 dark:bg-white/5" id="notifications-panel">
<div class="flex items-start justify-between gap-4">
<div>
<p class="text-xs font-bold uppercase tracking-[0.24em] text-primary">Notificaciones</p>
<h2 class="mt-2 text-lg font-bold">Actualizaciones de tu cuenta</h2>
</div>
<button class="flex size-9 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-white/10" id="close-notifications-panel" type="button">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="mt-4 space-y-3" id="notifications-list"></div>
</section>
<section aria-label="Lista de restaurantes" class="space-y-6" id="restaurant-list">
<!-- Skeleton Loading State (Visible until JS loads) -->
<div class="space-y-6" id="loading-skeleton">
<div class="animate-pulse rounded-xl bg-slate-200 dark:bg-white/5 h-64 w-full"></div>
<div class="animate-pulse rounded-xl bg-slate-200 dark:bg-white/5 h-64 w-full"></div>
</div>
<!-- Dynamic cards will be injected here -->
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 z-50 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-white/10">
<div class="mx-auto flex max-w-md h-16 items-center justify-around px-4">
<a class="flex flex-1 flex-col items-center justify-center gap-0.5 text-primary" href="index.html">
<span class="material-symbols-outlined fill-icon text-2xl">home</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Inicio</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-0.5 text-slate-500 dark:text-slate-400" href="restaurants.html">
<span class="material-symbols-outlined text-2xl">search</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Explorar</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-0.5 text-slate-500 dark:text-slate-400" href="cart.html">
<div class="relative">
<span class="material-symbols-outlined text-2xl">shopping_bag</span>
<span class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-primary text-[8px] font-bold text-background-dark">2</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-tighter">Pedidos</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-0.5 text-slate-500 dark:text-slate-400" href="address_management.html">
<span class="material-symbols-outlined text-2xl">person</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Perfil</p>
</a>
</div>
<div class="h-4 dark:bg-background-dark"></div>
</nav>
</div>
<!-- Backend Integration Script -->
<script>
    const session = JSON.parse(localStorage.getItem('tupedido.session') || 'null');
        let allRestaurants = [];
        const notificationItems = [
            {
                title: 'Direccion de entrega',
                description: 'Revisa que tu direccion predeterminada sea correcta antes de pedir.'
            },
            {
                title: 'Promociones activas',
                description: 'Hay restaurantes con envio gratis disponibles para tu zona.'
            },
            {
                title: 'Seguimiento de pedidos',
                description: 'Tus pedidos recientes aparecen en la seccion Mis Pedidos.'
            }
        ];
        function getRestaurantMenuUrl(restaurantSlug) {
            return `restaurants_menu.html?restaurant=${encodeURIComponent(restaurantSlug)}`;
        }

        function createRestaurantCard(restaurant) {
            const categoriesText = restaurant.cuisine;
            const cardClasses = 'group relative flex flex-col overflow-hidden rounded-xl bg-white dark:bg-white/5 border border-slate-200 dark:border-white/5 transition-all hover:shadow-lg';

            return `
                <article class="${cardClasses}" data-id="${restaurant.id}" onclick="openRestaurantMenu('${restaurant.slug}')">
                    <div class="relative aspect-[16/9] w-full overflow-hidden">
                        <div class="absolute inset-0 bg-cover bg-center transition-transform duration-500 group-hover:scale-110" 
                             style="background-image: url('${restaurant.cover_image}');">
                        </div>

                        <div class="absolute top-3 left-3 flex gap-2">
                            <span class="inline-flex items-center rounded-full bg-green-500 px-2.5 py-0.5 text-xs font-bold text-white uppercase tracking-wider">
                                Disponible
                            </span>
                            ${restaurant.delivery_fee?.toLowerCase().includes('gratis') ? `
                                <span class="inline-flex items-center rounded-full bg-primary px-2.5 py-0.5 text-xs font-bold text-background-dark uppercase tracking-wider">Popular</span>
                            ` : ''}
                        </div>
                        
                        <div class="absolute top-3 right-3">
                            <button class="flex size-8 items-center justify-center rounded-full bg-black/40 backdrop-blur-md text-white" type="button">
                                <span class="material-symbols-outlined text-lg">favorite</span>
                            </button>
                        </div>
                    </div>

                    <div class="flex flex-col p-4">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="text-xl font-bold text-slate-900 dark:text-white">${restaurant.name}</h3>
                            <div class="flex items-center gap-1 bg-primary/10 px-2 py-0.5 rounded-lg">
                                <span class="material-symbols-outlined text-primary text-sm fill-icon">star</span>
                                <span class="text-primary font-bold text-sm">${Number(restaurant.rating).toFixed(1)}</span>
                            </div>
                        </div>
                        <p class="text-slate-500 dark:text-slate-400 text-sm mb-3 font-medium">${categoriesText}</p>
                        
                        <div class="flex items-center justify-between border-t border-slate-100 dark:border-white/10 pt-3 mt-1">
                            <div class="flex items-center gap-4">
                                <div class="flex items-center gap-1 text-slate-600 dark:text-slate-300">
                                    <span class="material-symbols-outlined text-primary text-lg">schedule</span>
                                    <span class="text-sm font-semibold">${restaurant.eta_minutes}</span>
                                </div>
                                ${restaurant.delivery_fee ? `
                                    <div class="flex items-center gap-1 text-slate-600 dark:text-slate-300">
                                        <span class="material-symbols-outlined text-primary text-lg">delivery_dining</span>
                                        <span class="text-sm font-semibold">${restaurant.delivery_fee}</span>
                                    </div>
                                ` : ''}
                            </div>
                                <button class="flex items-center justify-center rounded-lg bg-primary text-background-dark px-4 py-2 font-bold text-sm" 
                                    onclick="event.stopPropagation(); openRestaurantMenu('${restaurant.slug}')">
                                Pedir ahora
                            </button>
                        </div>
                    </div>
                </article>
            `;
        }

        function openRestaurantMenu(restaurantSlug) {
            window.location.href = getRestaurantMenuUrl(restaurantSlug);
        }

        function renderNotifications() {
            const list = document.getElementById('notifications-list');
            list.innerHTML = notificationItems.map((item) => `
                <article class="rounded-xl border border-slate-200 bg-slate-50 p-4 dark:border-white/10 dark:bg-white/5">
                    <h3 class="text-sm font-bold">${item.title}</h3>
                    <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">${item.description}</p>
                </article>
            `).join('');
        }

        function applyRestaurantFilter(query) {
            const normalizedQuery = query.trim().toLowerCase();
            const filteredRestaurants = allRestaurants.filter((restaurant) => {
                const haystack = [restaurant.name, restaurant.cuisine, restaurant.description].join(' ').toLowerCase();
                return haystack.includes(normalizedQuery);
            });

            const container = document.getElementById('restaurant-list');
            container.innerHTML = filteredRestaurants.length
                ? filteredRestaurants.map((restaurant) => createRestaurantCard(restaurant)).join('')
                : '<div class="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-500 dark:border-white/10 dark:bg-white/5 dark:text-slate-400">No encontramos restaurantes para esa busqueda.</div>';
        }

        async function fetchAndRenderRestaurants() {
            const container = document.getElementById('restaurant-list');
            const skeleton = document.getElementById('loading-skeleton');

            try {
                const response = await fetch('http://localhost:8016/api/v1/restaurants');
                const data = await response.json();
                if (!response.ok) {
                    throw new Error('No se pudieron cargar los restaurantes');
                }

                allRestaurants = data;

                skeleton.classList.add('hidden');
                container.innerHTML = data.length
                    ? data.map(res => createRestaurantCard(res)).join('')
                    : '<p class="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-500 dark:border-white/10 dark:bg-white/5 dark:text-slate-400">Todavía no hay restaurantes disponibles.</p>';
            } catch (error) {
                console.error("Error loading restaurants:", error);
                container.innerHTML = `<p class="text-center py-10 text-slate-500">Error al cargar restaurantes. Por favor reintenta.</p>`;
            }
        }

        async function loadCurrentAddress() {
            const currentAddress = document.getElementById('current-address');
            if (!session) {
                currentAddress.textContent = 'Selecciona tu dirección';
                return;
            }

            try {
                const response = await fetch('http://localhost:8016/api/v1/addresses', {
                    headers: {
                        'Authorization': `Bearer ${session.access_token}`
                    }
                });

                if (!response.ok) {
                    currentAddress.textContent = 'Selecciona tu dirección';
                    return;
                }

                const addresses = await response.json();
                const selected = addresses.find((address) => address.is_default) || addresses[0];
                currentAddress.textContent = selected
                    ? `${selected.street}${selected.details ? `, ${selected.details}` : ''}`
                    : 'Agrega tu dirección';
            } catch (error) {
                console.error('No se pudo cargar la dirección actual:', error);
                currentAddress.textContent = 'Selecciona tu dirección';
            }
        }

        // Initialize application
        document.addEventListener('DOMContentLoaded', () => {
            fetchAndRenderRestaurants();
            loadCurrentAddress();
            renderNotifications();
            window.openRestaurantMenu = openRestaurantMenu;
            document.getElementById('current-location-selector').addEventListener('click', () => {
                window.location.href = session ? 'address_management.html' : 'login.html';
            });
            document.getElementById('search-toggle-button').addEventListener('click', () => {
                const panel = document.getElementById('restaurant-search-panel');
                const input = document.getElementById('restaurant-search-input');
                panel.classList.toggle('hidden');
                if (!panel.classList.contains('hidden')) {
                    input.focus();
                } else {
                    input.value = '';
                    applyRestaurantFilter('');
                }
            });
            document.getElementById('restaurant-search-input').addEventListener('input', (event) => {
                applyRestaurantFilter(event.target.value);
            });
            document.getElementById('notifications-button').addEventListener('click', () => {
                document.getElementById('notifications-panel').classList.toggle('hidden');
            });
            document.getElementById('close-notifications-panel').addEventListener('click', () => {
                document.getElementById('notifications-panel').classList.add('hidden');
            });
        });
    </script>
<script src="pwa.js"></script>
</body></html>
