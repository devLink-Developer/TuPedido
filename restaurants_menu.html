<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative mx-auto flex min-h-screen w-full max-w-md flex-col overflow-x-hidden border-x border-primary/10">
<!-- Top Navigation & Hero Image -->

</div>
<div class="relative flex items-center justify-between p-4 z-10">
<button class="bg-background-dark/50 backdrop-blur-md text-white p-2 rounded-full hover:bg-primary transition-colors" onclick="window.location.href='restaurants.html'" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex gap-2">
<button class="bg-background-dark/50 backdrop-blur-md text-white p-2 rounded-full hover:bg-primary transition-colors">
<span class="material-symbols-outlined">search</span>
</button>
<button class="bg-background-dark/50 backdrop-blur-md text-white p-2 rounded-full hover:bg-primary transition-colors">
<span class="material-symbols-outlined">share</span>
</button>
</div>
</div>
</div>
<!-- Restaurant Info Header -->
<div class="px-4 -mt-12 relative z-20" data-restaurant-id="palace-001" id="restaurant-header">
<div class="bg-background-light dark:bg-background-dark/80 backdrop-blur-xl p-6 rounded-xl border border-slate-200/10 shadow-2xl">
<div class="flex items-center gap-4 mb-4">
<div class="size-20 rounded-xl bg-primary/20 flex items-center justify-center overflow-hidden border-2 border-primary">
<img class="w-full h-full object-cover" data-alt="Logo del restaurante" id="restaurant-logo-image" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0A3udhA_TfVV3gaJubz0_WWbFaXq39Mj4cPCKsE5sKGXPIva62EK8B3_LFoj60i9ItjjPTtxg-nMjzjnqNXbVffjJZqRMr2qRPq6RwhPj70nQOu7rPTsrCQI1ExpPF6O0xXCAHHx54TRg0_fOjtalqeCLQvosMOe-gC-BoqB2cIKVgWygfDaiQCKovkr-JJiVY0jdYANGNR1uLitzzPLIvp2Z104f2FF3yL3E-TnloHdkkwhswJ-oVEuuSzEGjo7HcHDd6hSkBQ"/>
</div>
<div>
<h1 class="text-2xl font-bold tracking-tight" id="restaurant-name">Cargando restaurante...</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm" id="restaurant-categories">Preparando información del menú</p>
</div>
</div>
<div class="grid grid-cols-3 gap-2 border-t border-slate-200/10 pt-4">
<div class="flex flex-col items-center justify-center border-r border-slate-200/10">
<div class="flex items-center gap-1 text-primary">
<span class="material-symbols-outlined text-sm font-bold">star</span>
<span class="font-bold" id="restaurant-rating">4.8</span>
</div>
<span class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">500+ Calific.</span>
</div>
<div class="flex flex-col items-center justify-center border-r border-slate-200/10">
<div class="flex items-center gap-1 text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined text-sm">schedule</span>
<span class="font-bold" id="restaurant-delivery-time">25-35</span>
</div>
<span class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Minutos</span>
</div>
<div class="flex flex-col items-center justify-center">
<div class="flex items-center gap-1 text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined text-sm">delivery_dining</span>
<span class="font-bold" id="restaurant-delivery-fee">Gratis</span>
</div>
<span class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Envío</span>
</div>
</div>
</div>
</div>
<!-- Category Tabs -->
<div class="sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-30 mt-4 border-b border-slate-200/10">
<div class="flex overflow-x-auto no-scrollbar px-4 gap-6 whitespace-nowrap" id="menu-tabs-scroll">
<button class="menu-tab shrink-0 flex flex-col items-center justify-center border-b-2 border-primary py-4 whitespace-nowrap text-primary" data-tab-target="promociones" type="button">
<span class="text-sm font-bold">Promociones</span>
</button>
<button class="menu-tab shrink-0 flex flex-col items-center justify-center border-b-2 border-transparent py-4 whitespace-nowrap text-slate-500" data-tab-target="hamburguesas" type="button">
<span class="text-sm font-bold">Hamburguesas</span>
</button>
<button class="menu-tab shrink-0 flex flex-col items-center justify-center border-b-2 border-transparent py-4 whitespace-nowrap text-slate-500" data-tab-target="acompaniamientos" type="button">
<span class="text-sm font-bold">Acompañamientos</span>
</button>
<button class="menu-tab shrink-0 flex flex-col items-center justify-center border-b-2 border-transparent py-4 whitespace-nowrap text-slate-500 pr-4" data-tab-target="bebidas" type="button">
<span class="text-sm font-bold">Bebidas</span>
</button>
</div>
</div>
<!-- Menu Items List -->
<div class="p-4 space-y-4 pb-32" id="menu-container">
<section class="menu-section space-y-4" data-tab-content="promociones">
<h2 class="text-lg font-bold mb-2" id="section-title-promociones">Promociones activas</h2>
<div class="space-y-4" id="section-content-promociones"></div>
</section>
<section class="menu-section hidden space-y-4" data-tab-content="hamburguesas">
<h2 class="text-lg font-bold mb-2" id="section-title-hamburguesas">Hamburguesas</h2>
<div class="space-y-4" id="section-content-hamburguesas"></div>
</section>
<section class="menu-section hidden space-y-4" data-tab-content="acompaniamientos">
<h2 class="text-lg font-bold mb-2" id="section-title-acompaniamientos">Para Acompañar</h2>
<div class="space-y-4" id="section-content-acompaniamientos"></div>
</section>
<section class="menu-section hidden space-y-4" data-tab-content="bebidas">
<h2 class="text-lg font-bold mb-2" id="section-title-bebidas">Bebidas</h2>
<div class="space-y-4" id="section-content-bebidas"></div>
</section>
</div>
<div class="fixed bottom-24 left-0 right-0 z-40 hidden" id="menu-feedback-shell">
<div class="mx-auto w-full max-w-md px-4">
<div class="hidden rounded-xl px-4 py-3 text-sm font-medium" id="menu-feedback"></div>
</div>
</div>
<!-- Floating Action Bar -->
<div class="fixed bottom-0 left-0 right-0 z-40 bg-gradient-to-t from-background-dark via-background-dark to-transparent">
<div class="mx-auto w-full max-w-md p-4">
<button class="w-full bg-primary text-white h-14 rounded-xl flex items-center justify-between px-6 shadow-2xl shadow-primary/40 active:scale-95 transition-transform" id="cart-button" onclick="window.location.href='cart.html'" type="button">
<div class="flex items-center gap-3">
<div class="bg-white/20 rounded-md px-2 py-0.5 text-sm font-bold" id="cart-count">2</div>
<span class="font-bold tracking-wide">Ver Carrito</span>
</div>
<span class="font-bold text-lg" id="cart-total">$23.49</span>
</button>
</div>
</div>
<script>
  const session = JSON.parse(localStorage.getItem('kepedimos.session') || 'null');
  const menuFeedback = document.getElementById('menu-feedback');
  const menuFeedbackShell = document.getElementById('menu-feedback-shell');
  function getSelectedRestaurantSlug() {
    return new URLSearchParams(window.location.search).get('restaurant') || '';
  }

  function createMenuItemCard(item) {
    const mediaContent = item.image
      ? `<img class="w-full h-full object-cover" alt="${item.name}" src="${item.image}"/>`
      : `<span class="material-symbols-outlined text-primary text-5xl">${item.icon || 'restaurant'}</span>`;

    return `
      <div class="flex bg-white dark:bg-slate-900/40 p-3 rounded-xl gap-4 border border-slate-200/5 hover:border-primary/30 transition-all" data-item-id="${item.id}" data-price="${item.price}">
        <div class="flex-1 space-y-1">
          <h3 class="font-bold text-base">${item.name}</h3>
          <p class="text-slate-500 dark:text-slate-400 text-xs line-clamp-2">${item.description}</p>
          <div class="flex items-center justify-between pt-2">
            <div class="flex flex-col">
              ${item.previousPrice ? `<span class="text-xs text-slate-500 line-through">$${Number(item.previousPrice).toFixed(2)}</span>` : ''}
              <span class="text-primary font-bold text-lg">$${Number(item.price).toFixed(2)}</span>
            </div>
            <button class="bg-primary text-white size-8 rounded-lg flex items-center justify-center shadow-lg shadow-primary/20 active:scale-90 transition-transform" onclick="addToCart('${item.id}', ${JSON.stringify(item.name)}, ${Number(item.price).toFixed(2)})">
              <span class="material-symbols-outlined text-xl">add</span>
            </button>
          </div>
        </div>
        <div class="size-24 rounded-lg overflow-hidden shrink-0 bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
          ${mediaContent}
        </div>
      </div>
    `;
  }

  function buildMenuSections(products) {
    const sections = {
      promociones: { title: 'Promociones activas', items: [] },
      hamburguesas: { title: 'Productos principales', items: [] },
      acompaniamientos: { title: 'Para acompañar', items: [] },
      bebidas: { title: 'Bebidas', items: [] },
    };

    products.forEach((product) => {
      const category = String(product.category || '').toLowerCase();
      if (category.includes('feature')) {
        sections.promociones.items.push(product);
      } else if (category.includes('side') || category.includes('acom')) {
        sections.acompaniamientos.items.push(product);
      } else if (category.includes('drink') || category.includes('beb')) {
        sections.bebidas.items.push(product);
      } else {
        sections.hamburguesas.items.push(product);
      }
    });

    if (!sections.promociones.items.length) {
      sections.promociones.items = [...sections.hamburguesas.items.slice(0, 2)];
    }

    return sections;
  }

  function renderEmptySection(sectionKey) {
    return `<div class="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-500 dark:border-white/10 dark:bg-white/5 dark:text-slate-400">No hay productos en ${sectionKey}.</div>`;
  }

  function renderRestaurantMenu(restaurant) {
    document.getElementById('restaurant-hero-image').style.backgroundImage = `url('${restaurant.heroImage}')`;
    document.getElementById('restaurant-logo-image').src = restaurant.logoImage || restaurant.heroImage;
    document.getElementById('restaurant-name').textContent = restaurant.name;
    document.getElementById('restaurant-categories').textContent = restaurant.categories;
    document.getElementById('restaurant-rating').textContent = restaurant.rating;
    document.getElementById('restaurant-delivery-time').textContent = restaurant.deliveryTime;
    document.getElementById('restaurant-delivery-fee').textContent = restaurant.deliveryFee;

    Object.entries(restaurant.sections).forEach(([sectionKey, sectionData]) => {
      document.getElementById(`section-title-${sectionKey}`).textContent = sectionData.title;
      document.getElementById(`section-content-${sectionKey}`).innerHTML = sectionData.items.length
        ? sectionData.items.map(createMenuItemCard).join('')
        : renderEmptySection(sectionData.title.toLowerCase());
    });
  }

  async function loadRestaurantMenu() {
    const restaurantSlug = getSelectedRestaurantSlug();
    if (!restaurantSlug) {
      window.location.href = 'restaurants.html';
      return;
    }

    try {
      const response = await fetch(`http://localhost:8016/api/v1/restaurants/${encodeURIComponent(restaurantSlug)}`);
      const restaurant = await response.json();
      if (!response.ok) {
        throw new Error(restaurant.detail || 'No se pudo cargar el restaurante');
      }

      renderRestaurantMenu({
        name: restaurant.name,
        categories: restaurant.cuisine,
        rating: Number(restaurant.rating).toFixed(1),
        deliveryTime: restaurant.eta_minutes,
        deliveryFee: restaurant.delivery_fee,
        heroImage: restaurant.cover_image,
        logoImage: restaurant.cover_image,
        sections: buildMenuSections(restaurant.products || []),
      });
    } catch (error) {
      console.error('No se pudo cargar el menú del restaurante:', error);
      document.getElementById('menu-container').innerHTML = '<div class="rounded-xl border border-red-200 bg-red-100 p-4 text-sm text-red-700 dark:border-red-500/20 dark:bg-red-500/10 dark:text-red-300">No se pudo cargar el menú del restaurante.</div>';
    }
  }

  function showMenuFeedback(message, tone = 'info') {
    menuFeedbackShell.classList.remove('hidden');
    menuFeedback.className = 'rounded-xl px-4 py-3 text-sm font-medium';
    if (tone === 'error') {
      menuFeedback.classList.add('bg-red-100', 'text-red-700', 'dark:bg-red-500/10', 'dark:text-red-300');
    } else if (tone === 'success') {
      menuFeedback.classList.add('bg-emerald-100', 'text-emerald-700', 'dark:bg-emerald-500/10', 'dark:text-emerald-300');
    } else {
      menuFeedback.classList.add('bg-slate-200', 'text-slate-700', 'dark:bg-primary/10', 'dark:text-primary');
    }
    menuFeedback.textContent = message;
    menuFeedback.classList.remove('hidden');
    window.setTimeout(() => {
      menuFeedback.classList.add('hidden');
      menuFeedbackShell.classList.add('hidden');
    }, 2500);
  }

  async function syncCartBadge() {
    if (!session) {
      return;
    }

    try {
      const response = await fetch('http://localhost:8016/api/v1/cart', {
        headers: {
          'Authorization': `Bearer ${session.access_token}`
        }
      });
      if (!response.ok) {
        return;
      }

      const cart = await response.json();
      const count = cart.items.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('cart-count').textContent = String(count);
      document.getElementById('cart-total').textContent = `$${Number(cart.total).toFixed(2)}`;
    } catch (error) {
      console.error('No se pudo sincronizar el carrito:', error);
    }
  }

  function setActiveMenuTab(tabName) {
    document.querySelectorAll('.menu-tab').forEach((tabButton) => {
      const isActive = tabButton.dataset.tabTarget === tabName;
      tabButton.classList.toggle('border-primary', isActive);
      tabButton.classList.toggle('text-primary', isActive);
      tabButton.classList.toggle('border-transparent', !isActive);
      tabButton.classList.toggle('text-slate-500', !isActive);
    });

    document.querySelectorAll('.menu-section').forEach((section) => {
      section.classList.toggle('hidden', section.dataset.tabContent !== tabName);
    });
  }

  function initMenuTabs() {
    document.querySelectorAll('.menu-tab').forEach((tabButton) => {
      tabButton.addEventListener('click', () => {
        setActiveMenuTab(tabButton.dataset.tabTarget);
      });
    });
  }

    /**
     * API Integration Helper
     * Demonstrates how to POST an 'add to cart' action to a backend.
     */
    async function addToCart(productId, productName, price) {
    if (!session) {
      localStorage.setItem('kepedimos.flash', JSON.stringify({ message: 'Inicia sesión para agregar productos al carrito.', tone: 'info' }));
      window.location.href = 'login.html';
      return;
    }

        console.log(`Adding ${productName} (${productId}) to cart...`);
        
        const payload = {
      product_id: productId,
      product_name: productName,
      unit_price: price,
            quantity: 1,
            timestamp: new Date().toISOString()
        };

        try {
      const response = await fetch('http://localhost:8016/api/v1/cart/items', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`
        },
        body: JSON.stringify(payload)
      });
      if (!response.ok) {
        const result = await response.json();
        throw new Error(result.detail || 'No se pudo agregar al carrito');
      }
            
            // Visual feedback
            const cartBtn = document.getElementById('cart-button');
            cartBtn.classList.add('scale-105');
            setTimeout(() => cartBtn.classList.remove('scale-105'), 200);
      syncCartBadge();
      showMenuFeedback(`${productName} agregado al carrito.`, 'success');
            
        } catch (error) {
      console.error('Failed to add item to cart:', error);
      showMenuFeedback(error.message || 'No se pudo agregar al carrito', 'error');
        }
    }

  document.addEventListener('DOMContentLoaded', () => {
    loadRestaurantMenu();
    syncCartBadge();
    initMenuTabs();
    setActiveMenuTab('promociones');
  });
</script>
<script src="pwa.js"></script>
</div>
